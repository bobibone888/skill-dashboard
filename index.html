<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; padding: 32px; }
.header { text-align: center; margin-bottom: 32px; }
.header h1 { font-size: 28px; color: #fff; margin-bottom: 8px; }
.header .stats { font-size: 14px; color: #888; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
.filter-btn { padding: 6px 14px; border-radius: 16px; border: 1px solid #333; background: transparent; color: #aaa; cursor: pointer; font-size: 13px; transition: all .2s; }
.filter-btn:hover, .filter-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.card { background: #1a1d27; border: 1px solid #2a2d37; border-radius: 12px; padding: 20px; transition: transform .2s, box-shadow .2s; cursor: pointer; }
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.3); }
.card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.card-name { font-size: 16px; font-weight: 600; color: #fff; }
.card-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #2563eb22; color: #60a5fa; }
.card-desc { font-size: 13px; color: #999; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.card-dir { font-size: 11px; color: #555; margin-top: 10px; font-family: monospace; }
/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; justify-content: center; align-items: center; padding: 32px; }
.modal-overlay.show { display: flex; }
.modal { background: #1a1d27; border: 1px solid #2a2d37; border-radius: 16px; max-width: 640px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 32px; position: relative; }
.modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #888; font-size: 24px; cursor: pointer; }
.modal-close:hover { color: #fff; }
.modal h2 { font-size: 20px; color: #fff; margin-bottom: 8px; }
.modal .mtag { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: 10px; background: #2563eb22; color: #60a5fa; margin-bottom: 16px; }
.msection { margin-bottom: 14px; }
.msection-title { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; font-weight: 600; }
.msection-body { font-size: 14px; color: #ccc; line-height: 1.7; }
.msection-list { list-style: none; padding: 0; columns: 2; column-gap: 16px; }
.msection-list li { font-size: 12px; color: #aaa; padding: 2px 0; break-inside: avoid; }
.msection-list li::before { content: "§ "; color: #60a5fa; }
.modal-path { font-size: 11px; color: #444; margin-top: 16px; font-family: monospace; padding-top: 12px; border-top: 1px solid #222; }
</style>
</head>
<body>
<div class="header">
  <h1>🧠 Skill Dashboard</h1>
  <div class="stats" id="stats"></div>
</div>
<div class="filters" id="filters"></div>
<div class="grid" id="grid"></div>
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2 id="mName"></h2>
    <span class="mtag" id="mTag"></span>
    <div id="mBody"></div>
    <div class="modal-path" id="mPath"></div>
  </div>
</div>

<script>
let allSkills = [];
let activeFilter = 'all';

async function load() {
  const res = await fetch('/api/skills');
  allSkills = await res.json();
  console.log('[dashboard] loaded', allSkills.length, 'skills, sample:', allSkills[0]);
  render();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function render() {
  const filtered = activeFilter === 'all' ? allSkills : allSkills.filter(s => s.category === activeFilter);
  document.getElementById('stats').textContent = `共 ${allSkills.length} 个 Skills · 当前显示 ${filtered.length} 个`;
  const categories = ['all', ...new Set(allSkills.map(s => s.category))];
  document.getElementById('filters').innerHTML = categories.map(c =>
    `<button class="filter-btn ${c === activeFilter ? 'active' : ''}" onclick="setFilter('${c}')">${c === 'all' ? '全部' : c}</button>`
  ).join('');
  document.getElementById('grid').innerHTML = filtered.map((s, i) => `
    <div class="card" onclick="openModal(${i})">
      <div class="card-header">
        <span class="card-name">${esc(s.name)}</span>
        <span class="card-tag">${esc(s.category)}</span>
      </div>
      <div class="card-desc">${esc(s.description)}</div>
      <div class="card-dir">${esc(s.dir)}/</div>
    </div>
  `).join('');
}

function setFilter(f) { activeFilter = f; render(); }

function openModal(idx) {
  const filtered = activeFilter === 'all' ? allSkills : allSkills.filter(s => s.category === activeFilter);
  const s = filtered[idx];
  if (!s) return;

  console.log('[dashboard] openModal', idx, s);

  document.getElementById('mName').textContent = s.name;
  document.getElementById('mTag').textContent = s.category;

  let html = '';

  // 简介 - always show
  const desc = s.description || s.title || s.name;
  html += '<div class="msection"><div class="msection-title">简介</div><div class="msection-body">' + esc(desc) + '</div></div>';

  // 触发场景
  if (s.trigger) {
    html += '<div class="msection"><div class="msection-title">触发场景</div><div class="msection-body">' + esc(s.trigger) + '</div></div>';
  }

  // 文档结构
  if (s.sections && s.sections.length > 0) {
    html += '<div class="msection"><div class="msection-title">文档结构</div><ul class="msection-list">' + s.sections.map(t => '<li>' + esc(t) + '</li>').join('') + '</ul></div>';
  }

  document.getElementById('mBody').innerHTML = html;
  document.getElementById('mPath').textContent = s.dir + '/SKILL.md';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

load();
</script>
</body>
</html>
