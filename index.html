<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; padding: 32px; }
.header { text-align: center; margin-bottom: 32px; }
.header h1 { font-size: 28px; color: #fff; margin-bottom: 8px; }
.header .stats { font-size: 14px; color: #888; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
.filter-btn { padding: 6px 14px; border-radius: 16px; border: 1px solid #333; background: transparent; color: #aaa; cursor: pointer; font-size: 13px; transition: all .2s; }
.filter-btn:hover, .filter-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.card { background: #1a1d27; border: 1px solid #2a2d37; border-radius: 12px; padding: 20px; transition: transform .2s, box-shadow .2s; cursor: pointer; }
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.3); }
.card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.card-name { font-size: 16px; font-weight: 600; color: #fff; }
.card-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #2563eb22; color: #60a5fa; }
.card-desc { font-size: 13px; color: #999; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.card-dir { font-size: 11px; color: #555; margin-top: 10px; font-family: monospace; }
/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; justify-content: center; align-items: center; padding: 32px; }
.modal-overlay.show { display: flex; }
.modal { background: #1a1d27; border: 1px solid #2a2d37; border-radius: 16px; max-width: 640px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 32px; position: relative; }
.modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #888; font-size: 24px; cursor: pointer; }
.modal-close:hover { color: #fff; }
.modal h2 { font-size: 20px; color: #fff; margin-bottom: 8px; }
.modal .modal-tag { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: 10px; background: #2563eb22; color: #60a5fa; margin-bottom: 16px; }
.modal-section { margin-bottom: 16px; }
.modal-section-title { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.modal-section-body { font-size: 14px; color: #ccc; line-height: 1.7; }
.modal-sections-list { list-style: none; padding: 0; }
.modal-sections-list li { font-size: 13px; color: #aaa; padding: 3px 0; border-bottom: 1px solid #222; }
.modal-sections-list li::before { content: "§ "; color: #60a5fa; }
.modal-path { font-size: 11px; color: #555; margin-top: 12px; font-family: monospace; }
</style>
</head>
<body>
<div class="header">
  <h1>🧠 Skill Dashboard</h1>
  <div class="stats" id="stats"></div>
</div>
<div class="filters" id="filters"></div>
<div class="grid" id="grid"></div>
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBody">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2 id="modalName"></h2>
    <span class="modal-tag" id="modalTag"></span>
    <div id="modalContent"></div>
    <div class="modal-path" id="modalPath"></div>
  </div>
</div>

<script>
let allSkills = [];
let activeFilter = 'all';

async function load() {
  const res = await fetch('/api/skills');
  allSkills = await res.json();
  render();
}

function render() {
  const filtered = activeFilter === 'all' ? allSkills : allSkills.filter(s => s.category === activeFilter);
  document.getElementById('stats').textContent = `共 ${allSkills.length} 个 Skills · 当前显示 ${filtered.length} 个`;
  
  const categories = ['all', ...new Set(allSkills.map(s => s.category))];
  document.getElementById('filters').innerHTML = categories.map(c => 
    `<button class="filter-btn ${c === activeFilter ? 'active' : ''}" onclick="setFilter('${c}')">${c === 'all' ? '全部' : c}</button>`
  ).join('');
  
  document.getElementById('grid').innerHTML = filtered.map((s, i) => `
    <div class="card" onclick="openModal(${i})">
      <div class="card-header">
        <span class="card-name">${s.name}</span>
        <span class="card-tag">${s.category}</span>
      </div>
      <div class="card-desc">${esc(s.description)}</div>
      <div class="card-dir">${s.dir}/</div>
    </div>
  `).join('');
}

function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

function setFilter(f) { activeFilter = f; render(); }

function openModal(idx) {
  const filtered = activeFilter === 'all' ? allSkills : allSkills.filter(s => s.category === activeFilter);
  const s = filtered[idx];
  if (!s) return;
  document.getElementById('modalName').textContent = s.name;
  document.getElementById('modalTag').textContent = s.category;
  
  let html = '';
  if (s.description) {
    html += `<div class="modal-section"><div class="modal-section-title">简介</div><div class="modal-section-body">${esc(s.description)}</div></div>`;
  }
  if (s.trigger) {
    html += `<div class="modal-section"><div class="modal-section-title">触发场景</div><div class="modal-section-body">${esc(s.trigger)}</div></div>`;
  }
  if (s.dependencies) {
    html += `<div class="modal-section"><div class="modal-section-title">依赖</div><div class="modal-section-body">${esc(s.dependencies)}</div></div>`;
  }
  if (s.sections && s.sections.length) {
    html += `<div class="modal-section"><div class="modal-section-title">文档结构</div><ul class="modal-sections-list">${s.sections.map(t => `<li>${esc(t)}</li>`).join('')}</ul></div>`;
  }
  if (!html) {
    html = '<div class="modal-section"><div class="modal-section-body" style="color:#666">暂无详细信息</div></div>';
  }
  
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalPath').textContent = s.dir + '/SKILL.md';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

load();
</script>
</body>
</html>
